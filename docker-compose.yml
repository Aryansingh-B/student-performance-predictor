# ─────────────────────────────────────────────────────────────────
# docker-compose.yml — Runs Streamlit + FastAPI as separate services
#
# What this does:
#   - Defines 2 services: 'app' (Streamlit) and 'api' (FastAPI)
#   - Both share the same project files via volume mount
#   - Streamlit runs on port 8501
#   - FastAPI runs on port 8000
#   - Both start with one command: docker-compose up --build
# ─────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Streamlit Frontend ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-predictor-app
    ports:
      - "8501:8501"        # host:container
    volumes:
      - ./data:/app/data   # mounts local data/ so plots are visible
      - ./model:/app/model # mounts model/ so pkl is shared
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── FastAPI Backend ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: student-predictor-api
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model  # shares same model.pkl as Streamlit
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    depends_on:
      - app               # API starts after app is up

# ── Named Volume (optional persistent storage) ───────────────────
volumes:
  model_data: